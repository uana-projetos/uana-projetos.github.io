<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Atualizando CoachOrg...</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0A0704;
    color: #F2E5CB;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    text-align: center;
  }
  .logo { font-size: 32px; font-weight: 900; margin-bottom: 8px; }
  .logo span { color: #E8722A; }
  .status { font-size: 14px; color: #A8896A; margin-top: 16px; }
  .bar-wrap { width: 200px; height: 4px; background: #ffffff15; border-radius: 2px; margin-top: 20px; overflow: hidden; }
  .bar { height: 100%; background: #E8722A; border-radius: 2px; animation: prog 2s ease forwards; }
  @keyframes prog { from { width: 0% } to { width: 100% } }
</style>
</head>
<body>
<div class="logo">Coach<span>Org</span></div>
<div class="status" id="msg">Limpando cache antigo...</div>
<div class="bar-wrap"><div class="bar"></div></div>
<script>
(async function() {
  var msg = document.getElementById('msg');
  try {
    if ('caches' in window) {
      var keys = await caches.keys();
      await Promise.all(keys.map(function(k) { return caches.delete(k); }));
    }
    msg.textContent = 'Removendo versão antiga...';
    if ('serviceWorker' in navigator) {
      var regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(function(r) { return r.unregister(); }));
    }
    msg.textContent = 'Pronto! Abrindo versão nova...';
  } catch(e) {
    msg.textContent = 'Redirecionando...';
  }
  setTimeout(function() {
    window.location.replace('./index.html?t=' + Date.now());
  }, 2000);
})();
</script>
</body>
</html>
