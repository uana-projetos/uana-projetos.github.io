<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff5252"/>
      <stop offset="100%" stop-color="#ff1744"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5">
      <stop offset="0%" stop-color="#ff5252" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ff5252" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="540" cy="540" r="500" fill="url(#glow)"/>

  <g transform="translate(390, 130)">
    <rect width="300" height="300" rx="60" fill="#1a1a2e" stroke="#ff525250" stroke-width="3"/>
    <rect x="60" y="80" width="180" height="30" rx="9" fill="url(#accent)"/>
    <circle cx="80" cy="95" r="11" fill="#1a1a2e"/>
    <path d="M73 95 L79 101 L88 86" stroke="url(#accent)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="60" y="125" width="180" height="30" rx="9" fill="url(#accent)" opacity="0.7"/>
    <rect x="60" y="170" width="180" height="30" rx="9" fill="url(#accent)" opacity="0.4"/>
    <rect x="60" y="215" width="180" height="30" rx="9" fill="url(#accent)" opacity="0.2"/>
  </g>

  <text x="540" y="510" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="70" fill="#fff">Bora começar?</text>

  <text x="540" y="600" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="32" fill="#aaa">Instala como app de loja.</text>
  <text x="540" y="650" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="32" fill="#aaa">Funciona offline. Brasileiro.</text>

  <g transform="translate(140, 740)">
    <rect width="800" height="100" rx="50" fill="url(#accent)"/>
    <text x="400" y="65" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="36" fill="#fff">👉 LINK NA BIO</text>
  </g>

  <text x="540" y="900" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="24" fill="#666">coachorg-app.github.io/coachorg</text>

  <text x="540" y="970" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="22" fill="#ff5252" letter-spacing="6">@COACHORG.APP</text>
