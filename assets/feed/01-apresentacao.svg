  <text x="540" y="650" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="100" fill="#fff" letter-spacing="-3">Coach<tspan fill="#ff5252">Org</tspan></text>
  <text x="540" y="720" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="26" fill="#999" letter-spacing="5">PARA PERSONAL TRAINER</text>

